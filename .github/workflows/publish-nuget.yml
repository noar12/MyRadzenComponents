name: Publish NuGet package

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore NoarRadzenComponents/NoarRadzenComponents.csproj

      - name: Determine package version
        id: version
        run: |
          set -e
          csproj_path=NoarRadzenComponents/NoarRadzenComponents.csproj
          version=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' "$csproj_path" | head -n1)
          if [ -z "$version" ]; then
            echo 'Could not read <Version> from $csproj_path' >&2
            exit 1
          fi
          echo "csproj version = $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
            tag="${tag#v}"
            if [ "$tag" != "$version" ]; then
              echo "Tag version '$tag' does not match csproj version '$version'" >&2
              exit 1
            fi
          fi

      - name: Build Release
        run: dotnet build NoarRadzenComponents/NoarRadzenComponents.csproj -c Release

      - name: Pack NuGet package
        run: |
          set -e
          version="${{ steps.version.outputs.version }}"
          echo "Package version = $version"
          dotnet pack NoarRadzenComponents/NoarRadzenComponents.csproj -c Release -o ./artifacts /p:Version="$version" --no-restore --no-build

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
